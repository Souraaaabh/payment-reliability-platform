spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  datasource:
    url: jdbc:mysql://localhost:3306/payment_db
    username: root
    password: root

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-service-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: record

  ai:
    model:
      chat: ollama
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      init:
        pull-model-strategy: never
        timeout: 5m
        max-retries: 0
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:qwen2.5:1.5b}
          temperature: 0.2

resilience4j:
  retry:
    instances:
      bankApiRetry:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.sourabh.payment_platform.exception.BankApiException
        ignore-exceptions:
          - com.sourabh.payment_platform.shared.exception.DuplicatePaymentException
  circuitbreaker:
    instances:
      bankApiCircuitBreaker:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
        record-exceptions:
          - com.sourabh.payment_platform.exception.BankApiException

app:
  kafka:
    payment-created-topic: payment-created-events
    auto-create-topic: true
  cache:
    payment-ttl: 10m
  rate-limit:
    payment-create-limit: 5
    payment-create-window: 60s
